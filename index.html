<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#14101c">
<title>Guilda do Lar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#14101c; --panel:#1e1830; --panel-2:#271f3d; --panel-3:#322748;
  --ink:#ECE3D0; --ink-dim:#a99fbf; --ink-faint:#7d7396;
  --gold:#E8B45C; --gold-deep:#C68A2E; --gold-soft:#f4d9a8;
  --line:rgba(232,180,92,.16); --line-strong:rgba(232,180,92,.34);
  --easy:#7FB86A; --normal:#5BA3C9; --hard:#E08A3C; --epic:#B57BE0;
  --danger:#d96a6a; --ok:#7FB86A;
  --shadow:0 12px 30px -12px rgba(0,0,0,.7);
  --serif:'Cinzel',Georgia,serif; --sans:'Inter',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--sans); color:var(--ink); background:var(--bg);
  background-image:
    radial-gradient(1200px 500px at 50% -10%, rgba(123,79,179,.18), transparent 60%),
    radial-gradient(800px 400px at 100% 100%, rgba(232,180,92,.06), transparent 55%);
  background-attachment:fixed;
  min-height:100vh; min-height:100dvh; overscroll-behavior-y:none;
  -webkit-font-smoothing:antialiased;
}
.app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px}
::-webkit-scrollbar{width:0;height:0}

/* ---------- top bar ---------- */
.topbar{
  position:sticky;top:0;z-index:30;
  background:linear-gradient(180deg, rgba(20,16,28,.96), rgba(20,16,28,.82));
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
  padding:14px 16px 12px; display:flex;align-items:center;gap:11px;
}
.crest{
  width:40px;height:40px;flex:none;border-radius:11px;display:grid;place-items:center;
  background:radial-gradient(circle at 35% 30%, var(--panel-3), var(--panel));
  border:1px solid var(--line-strong);font-size:21px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
}
.topbar .who{flex:1;min-width:0}
.topbar .guild{font-family:var(--serif);font-weight:700;font-size:13px;letter-spacing:.06em;color:var(--gold-soft);text-transform:uppercase}
.topbar .hero-line{font-size:12.5px;color:var(--ink-dim);margin-top:1px;display:flex;align-items:center;gap:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.swap-btn{flex:none;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 11px;font-size:12px;color:var(--ink-dim);display:flex;align-items:center;gap:5px}
.swap-btn:active{transform:scale(.95)}

/* ---------- content ---------- */
.content{flex:1;padding:16px 16px 96px;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.section-eyebrow{font-family:var(--serif);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);opacity:.85;margin:2px 0 10px}
h2.title{font-family:var(--serif);font-weight:700;font-size:21px;margin:0 0 2px;letter-spacing:.01em}

/* ---------- period tabs ---------- */
.tabs{display:flex;gap:6px;background:var(--panel);padding:5px;border-radius:13px;border:1px solid var(--line);margin-bottom:16px}
.tab{flex:1;padding:9px 4px;border-radius:9px;font-size:12.5px;font-weight:600;color:var(--ink-faint);display:flex;flex-direction:column;align-items:center;gap:3px;transition:.18s}
.tab .ic{font-size:16px}
.tab.active{background:linear-gradient(180deg,var(--panel-3),var(--panel-2));color:var(--gold-soft);box-shadow:var(--shadow)}
.tab .ct{font-size:10px;color:var(--ink-faint);font-weight:600}
.tab.active .ct{color:var(--gold)}

/* ---------- quest card ---------- */
.quest{
  display:flex;align-items:center;gap:12px;padding:14px;border-radius:15px;margin-bottom:10px;
  background:linear-gradient(180deg,var(--panel-2),var(--panel));
  border:1px solid var(--line);position:relative;overflow:hidden;
  transition:transform .15s, opacity .3s;
}
.quest::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--diff,var(--normal))}
.quest .q-ic{width:42px;height:42px;flex:none;border-radius:11px;display:grid;place-items:center;font-size:21px;background:var(--panel-3);border:1px solid var(--line)}
.quest .q-body{flex:1;min-width:0}
.quest .q-title{font-weight:600;font-size:15px;line-height:1.25}
.quest .q-meta{display:flex;align-items:center;gap:7px;margin-top:5px;flex-wrap:wrap}
.chip{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:20px;letter-spacing:.02em;display:inline-flex;align-items:center;gap:3px}
.chip.xp{background:rgba(232,180,92,.14);color:var(--gold-soft);border:1px solid var(--line-strong)}
.chip.diff{background:color-mix(in srgb, var(--diff) 16%, transparent);color:var(--diff)}
.chip.who{background:var(--panel-3);color:var(--ink-dim)}
.q-done-btn{
  flex:none;width:46px;height:46px;border-radius:50%;display:grid;place-items:center;
  background:radial-gradient(circle at 40% 35%, var(--panel-3),var(--panel));
  border:2px solid var(--line-strong);font-size:20px;color:var(--gold);transition:.18s;
}
.q-done-btn:active{transform:scale(.86)}
.quest.done{opacity:.5}
.quest.done .q-title{text-decoration:line-through;text-decoration-color:var(--gold-deep)}
.quest.done .q-done-btn{background:radial-gradient(circle at 40% 35%,var(--gold),var(--gold-deep));color:#1a1208;border-color:var(--gold);box-shadow:0 0 18px -4px var(--gold)}
.quest.done .q-done-by{font-size:10.5px;color:var(--gold);font-weight:600}

/* ---------- empty ---------- */
.empty{text-align:center;padding:46px 20px;color:var(--ink-faint)}
.empty .e-ic{font-size:44px;opacity:.7;margin-bottom:10px}
.empty .e-t{font-family:var(--serif);font-size:15px;color:var(--ink-dim);margin-bottom:4px}
.empty .e-s{font-size:13px}

/* ---------- hero card ---------- */
.hero-card{
  border-radius:20px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;
  background:
    radial-gradient(140px 140px at 85% -10%, rgba(232,180,92,.18), transparent 70%),
    linear-gradient(165deg,var(--panel-3),var(--panel));
  border:1px solid var(--line-strong);box-shadow:var(--shadow);
}
.hero-top{display:flex;align-items:center;gap:15px;margin-bottom:18px}
.hero-av{width:62px;height:62px;flex:none;border-radius:16px;display:grid;place-items:center;font-size:33px;background:var(--bg);border:2px solid var(--hero-color,var(--gold));box-shadow:0 0 22px -6px var(--hero-color,var(--gold))}
.hero-name{font-family:var(--serif);font-weight:700;font-size:20px;line-height:1.1}
.hero-class{font-size:12.5px;color:var(--ink-dim);margin-top:3px}
.lvl-badge{margin-left:auto;text-align:center;flex:none}
.lvl-badge .n{font-family:var(--serif);font-weight:700;font-size:30px;color:var(--gold-soft);line-height:1}
.lvl-badge .l{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint)}
.xpbar-wrap{margin-top:4px}
.xpbar-top{display:flex;justify-content:space-between;font-size:11.5px;color:var(--ink-dim);margin-bottom:6px}
.xpbar{height:13px;border-radius:8px;background:var(--bg);border:1px solid var(--line);overflow:hidden;position:relative}
.xpbar .fill{height:100%;border-radius:7px;background:linear-gradient(90deg,var(--gold-deep),var(--gold) 70%,var(--gold-soft));box-shadow:0 0 12px -2px var(--gold);transition:width .8s cubic-bezier(.2,.9,.3,1);position:relative}
.xpbar .fill::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);animation:shimmer 2.4s linear infinite}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:16px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px 8px;text-align:center}
.stat .v{font-family:var(--serif);font-weight:700;font-size:20px;color:var(--gold-soft)}
.stat .k{font-size:10.5px;color:var(--ink-faint);margin-top:3px;letter-spacing:.04em}

.ach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.ach{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px 6px;text-align:center;opacity:.4;transition:.3s;position:relative}
.ach.un{opacity:1;border-color:var(--line-strong);background:linear-gradient(180deg,var(--panel-2),var(--panel))}
.ach .a-ic{font-size:26px;filter:grayscale(1)}
.ach.un .a-ic{filter:none}
.ach .a-n{font-size:10px;font-weight:600;margin-top:5px;color:var(--ink-dim);line-height:1.2}
.ach.un .a-n{color:var(--gold-soft)}

/* ---------- placar ---------- */
.versus{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:stretch;margin-bottom:16px}
.vcard{background:linear-gradient(170deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:16px;padding:16px 11px;text-align:center}
.vcard.lead{border-color:var(--hero-color,var(--gold));box-shadow:0 0 22px -10px var(--hero-color,var(--gold))}
.vcard .v-av{font-size:34px}
.vcard .v-name{font-family:var(--serif);font-weight:600;font-size:14px;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vcard .v-lvl{font-size:11px;color:var(--ink-dim);margin-top:2px}
.vcard .v-xp{font-family:var(--serif);font-weight:700;font-size:22px;color:var(--gold-soft);margin-top:9px}
.vcard .v-xp small{font-size:11px;color:var(--ink-faint);font-weight:400;display:block;letter-spacing:.1em;text-transform:uppercase}
.vs-mid{display:grid;place-items:center;font-family:var(--serif);font-size:13px;color:var(--gold);align-self:center}
.crown{position:absolute;top:-9px;left:50%;transform:translateX(-50%);font-size:18px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}

.guild-bar{background:linear-gradient(170deg,var(--panel-2),var(--panel));border:1px solid var(--line-strong);border-radius:16px;padding:16px;margin-bottom:16px}
.guild-bar .gb-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.guild-bar .gb-l{font-family:var(--serif);font-size:13px;color:var(--gold-soft);letter-spacing:.04em}
.guild-bar .gb-v{font-family:var(--serif);font-weight:700;font-size:18px;color:var(--gold-soft)}

/* ---------- history feed ---------- */
.feed-day{font-family:var(--serif);font-size:12px;color:var(--gold);letter-spacing:.08em;margin:18px 0 9px;text-transform:uppercase}
.feed-item{display:flex;align-items:center;gap:11px;padding:11px 13px;background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:8px}
.feed-item .f-ic{font-size:19px;flex:none;width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:var(--panel-3)}
.feed-item .f-b{flex:1;min-width:0}
.feed-item .f-t{font-size:13.5px;font-weight:500;line-height:1.2}
.feed-item .f-s{font-size:11.5px;color:var(--ink-faint);margin-top:2px}
.feed-item .f-xp{font-family:var(--serif);font-weight:700;font-size:13px;color:var(--gold);flex:none}

/* ---------- forja / manage ---------- */
.add-quest-btn{width:100%;padding:15px;border-radius:14px;border:1.5px dashed var(--line-strong);background:var(--panel);color:var(--gold-soft);font-family:var(--serif);font-weight:600;font-size:14px;letter-spacing:.04em;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px}
.add-quest-btn:active{transform:scale(.98)}
.manage-q{display:flex;align-items:center;gap:11px;padding:12px;border-radius:13px;background:var(--panel);border:1px solid var(--line);margin-bottom:9px}
.manage-q.off{opacity:.45}
.manage-q .mq-ic{font-size:20px;width:38px;height:38px;flex:none;border-radius:10px;display:grid;place-items:center;background:var(--panel-3);border-left:3px solid var(--diff,var(--normal))}
.manage-q .mq-b{flex:1;min-width:0}
.manage-q .mq-t{font-weight:600;font-size:14px;line-height:1.2}
.manage-q .mq-m{font-size:11px;color:var(--ink-faint);margin-top:3px}
.icon-btn{width:34px;height:34px;flex:none;border-radius:9px;display:grid;place-items:center;background:var(--panel-3);border:1px solid var(--line);font-size:15px}
.icon-btn:active{transform:scale(.9)}

/* ---------- modal / sheet ---------- */
.scrim{position:fixed;inset:0;background:rgba(8,5,14,.72);backdrop-filter:blur(3px);z-index:50;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.scrim.open{opacity:1;pointer-events:auto}
.sheet{width:100%;max-width:480px;background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line-strong);border-bottom:none;border-radius:22px 22px 0 0;padding:8px 18px calc(22px + env(safe-area-inset-bottom));max-height:92dvh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.9,.3,1)}
.scrim.open .sheet{transform:none}
.grab{width:40px;height:4px;background:var(--line-strong);border-radius:3px;margin:8px auto 16px}
.sheet h3{font-family:var(--serif);font-weight:700;font-size:19px;margin:0 0 18px;text-align:center}
.field{margin-bottom:15px}
.field label{display:block;font-size:12px;color:var(--ink-dim);margin-bottom:7px;letter-spacing:.03em;font-weight:500}
.field input[type=text],.field textarea,.field select{
  width:100%;padding:13px 14px;border-radius:12px;background:var(--bg);
  border:1px solid var(--line);color:var(--ink);outline:none;transition:.18s;
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--gold-deep)}
.field textarea{resize:none;min-height:60px}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px}
.emoji-grid button{font-size:21px;padding:8px 0;border-radius:9px;background:var(--bg);border:1px solid var(--line)}
.emoji-grid button.sel{border-color:var(--gold);background:var(--panel-3);box-shadow:0 0 0 1px var(--gold)}
.seg{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
.seg.four{grid-template-columns:repeat(2,1fr)}
.seg button{padding:11px 6px;border-radius:11px;background:var(--bg);border:1px solid var(--line);font-size:12.5px;font-weight:600;color:var(--ink-dim);display:flex;flex-direction:column;align-items:center;gap:3px}
.seg button .sg-ic{font-size:17px}
.seg button.sel{color:var(--ink);border-color:var(--accent,var(--gold));background:color-mix(in srgb,var(--accent,var(--gold)) 12%,var(--bg));box-shadow:0 0 0 1px var(--accent,var(--gold))}
.seg button .sg-xp{font-size:10px;color:var(--gold)}
.btn-primary{width:100%;padding:15px;border-radius:13px;background:linear-gradient(180deg,var(--gold),var(--gold-deep));color:#1c1308;font-family:var(--serif);font-weight:700;font-size:15px;letter-spacing:.03em;margin-top:6px;box-shadow:0 8px 20px -8px var(--gold-deep)}
.btn-primary:active{transform:scale(.98)}
.btn-ghost{width:100%;padding:13px;border-radius:13px;background:transparent;color:var(--ink-faint);font-size:13px;margin-top:8px}
.btn-danger{color:var(--danger)}

/* ---------- hero picker ---------- */
.picker-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;padding:30px 22px 60px;text-align:center;animation:fade .4s ease}
.picker-crest{font-size:54px;margin-bottom:6px}
.picker-wrap h1{font-family:var(--serif);font-weight:700;font-size:27px;margin:0 0 6px;letter-spacing:.02em}
.picker-wrap .sub{color:var(--ink-dim);font-size:14px;margin-bottom:30px}
.hero-pick{display:flex;align-items:center;gap:14px;width:100%;padding:16px;border-radius:16px;background:linear-gradient(170deg,var(--panel-2),var(--panel));border:1px solid var(--line);margin-bottom:12px;text-align:left;transition:.18s}
.hero-pick:active{transform:scale(.98)}
.hero-pick .hp-av{width:54px;height:54px;flex:none;border-radius:14px;display:grid;place-items:center;font-size:29px;background:var(--bg);border:2px solid var(--hero-color,var(--gold))}
.hero-pick .hp-n{font-family:var(--serif);font-weight:600;font-size:17px}
.hero-pick .hp-l{font-size:12px;color:var(--ink-dim);margin-top:2px}
.hero-pick .hp-go{margin-left:auto;color:var(--gold);font-size:20px}

/* ---------- bottom nav ---------- */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:40;display:flex;background:linear-gradient(0deg,rgba(20,16,28,.99),rgba(20,16,28,.9));backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:8px 8px calc(8px + env(safe-area-inset-bottom))}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--ink-faint);font-size:10.5px;font-weight:600;letter-spacing:.02em;transition:.18s}
.nav button .n-ic{font-size:21px;transition:.18s}
.nav button.active{color:var(--gold-soft)}
.nav button.active .n-ic{transform:translateY(-1px) scale(1.08);filter:drop-shadow(0 0 8px rgba(232,180,92,.5))}

/* ---------- toast / xp pop ---------- */
.toast-layer{position:fixed;top:0;left:0;right:0;z-index:60;display:flex;flex-direction:column;align-items:center;pointer-events:none;padding-top:14px;gap:8px}
.toast{background:linear-gradient(180deg,var(--panel-3),var(--panel-2));border:1px solid var(--line-strong);border-radius:13px;padding:11px 18px;font-size:13.5px;font-weight:600;color:var(--ink);box-shadow:var(--shadow);display:flex;align-items:center;gap:9px;animation:toastIn .3s ease, toastOut .3s ease 2.2s forwards}
.toast .t-xp{font-family:var(--serif);font-weight:700;color:var(--gold)}
@keyframes toastIn{from{opacity:0;transform:translateY(-16px) scale(.9)}to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateY(-12px)}}

.levelup{position:fixed;inset:0;z-index:70;display:grid;place-items:center;pointer-events:none;opacity:0}
.levelup.show{opacity:1;animation:luFade 2.6s ease forwards}
@keyframes luFade{0%{opacity:0}12%{opacity:1}80%{opacity:1}100%{opacity:0}}
.levelup .lu-card{text-align:center;transform:scale(.6);animation:luPop 2.6s cubic-bezier(.2,1.3,.4,1) forwards}
@keyframes luPop{12%{transform:scale(1.05)}20%{transform:scale(1)}}
.levelup .lu-burst{font-size:74px;filter:drop-shadow(0 0 30px var(--gold))}
.levelup .lu-t{font-family:var(--serif);font-weight:700;font-size:13px;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;margin-top:6px}
.levelup .lu-n{font-family:var(--serif);font-weight:700;font-size:46px;color:var(--gold-soft);text-shadow:0 0 30px var(--gold-deep)}

.spark{position:fixed;z-index:65;pointer-events:none;font-size:18px;animation:sparkUp .9s ease-out forwards}
@keyframes sparkUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-70px) scale(.4)}}

/* ---------- demo banner ---------- */
.demo-flag{background:rgba(232,180,92,.1);border-bottom:1px solid var(--line);padding:7px 16px;font-size:11px;color:var(--gold-soft);text-align:center;letter-spacing:.02em}
.demo-flag b{font-weight:700}

.loading{flex:1;display:grid;place-items:center;color:var(--ink-faint);font-family:var(--serif);letter-spacing:.1em;font-size:13px}
.spin{width:34px;height:34px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 14px}
@keyframes sp{to{transform:rotate(360deg)}}

/* ---------- avatar com equipamentos ---------- */
.ava{display:inline-block;line-height:0;flex:none}
.av{position:relative;display:inline-grid;place-items:center;background:var(--bg);border:2px solid var(--av-color,var(--gold));border-radius:16px;flex:none}
.av .av-base{line-height:1}
.av .eq{position:absolute;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.65))}
.av .eq-head{top:-12%;left:50%;transform:translateX(-50%) rotate(-6deg)}
.av .eq-weapon{right:-9%;bottom:-7%}
.av .eq-pet{left:-9%;bottom:-7%}
.title-tag{font-family:var(--serif);font-size:.68em;color:var(--gold);font-weight:600;opacity:.95;white-space:nowrap}
.gold-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(232,180,92,.12);border:1px solid var(--line-strong);color:var(--gold-soft);font-weight:600;font-size:12.5px;padding:6px 12px;border-radius:20px;margin-top:10px}

/* ---------- mercado ---------- */
.shop-head{display:flex;flex-direction:column;align-items:center;text-align:center;background:radial-gradient(150px 120px at 50% 0,rgba(232,180,92,.16),transparent 70%),linear-gradient(170deg,var(--panel-3),var(--panel));border:1px solid var(--line-strong);border-radius:20px;padding:20px;margin-bottom:18px;box-shadow:var(--shadow)}
.shop-head .sh-name{font-family:var(--serif);font-weight:600;font-size:15px;margin-top:10px}
.shop-head .sh-bal{font-family:var(--serif);font-weight:700;font-size:27px;color:var(--gold-soft);margin-top:12px;display:flex;align-items:center;gap:8px}
.shop-head .sh-sub{font-size:11px;color:var(--ink-faint);margin-top:3px;letter-spacing:.02em}
.shop-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:4px}
.shop-item{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:14px;padding:13px 10px 11px;text-align:center;display:flex;flex-direction:column;align-items:center}
.shop-item.owned{border-color:var(--line-strong)}
.shop-item.equipped{border-color:var(--gold);box-shadow:0 0 16px -7px var(--gold)}
.shop-item .si-em{font-size:30px;line-height:1;margin-bottom:6px}
.shop-item .si-n{font-size:11.5px;font-weight:600;line-height:1.2;min-height:28px;display:flex;align-items:center;color:var(--ink-dim)}
.shop-item.owned .si-n{color:var(--ink)}
.shop-btn{width:100%;padding:8px;border-radius:9px;font-size:11.5px;font-weight:700;letter-spacing:.02em;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:4px}
.shop-btn.buy{background:linear-gradient(180deg,var(--gold),var(--gold-deep));color:#1c1308}
.shop-btn.equip{background:var(--panel-3);color:var(--gold-soft);border:1px solid var(--line-strong)}
.shop-btn.on{background:var(--panel-3);color:var(--gold);border:1px solid var(--gold)}
.shop-btn.locked{background:var(--bg);color:var(--ink-faint);border:1px solid var(--line)}
.shop-btn:active{transform:scale(.96)}
/* ---------- auth / família / menu ---------- */
.auth-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;padding:30px 22px 60px;text-align:center;animation:fade .4s ease}
.auth-wrap h1{font-family:var(--serif);font-weight:700;font-size:27px;margin:6px 0 6px;letter-spacing:.02em}
.auth-wrap .sub{color:var(--ink-dim);font-size:14px;margin-bottom:26px;line-height:1.45}
.auth-toggle{display:flex;gap:6px;background:var(--panel);padding:5px;border-radius:13px;border:1px solid var(--line);margin-bottom:18px}
.auth-toggle button{flex:1;padding:11px;border-radius:9px;font-size:13.5px;font-weight:600;color:var(--ink-faint)}
.auth-toggle button.on{background:linear-gradient(180deg,var(--panel-3),var(--panel-2));color:var(--gold-soft);box-shadow:var(--shadow)}
.auth-wrap .field input{text-align:center}
.pass-field{position:relative}
.pass-field input{padding-right:46px!important}
.pass-field .eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-size:16px;background:transparent}
.pass-field .eye:active{transform:translateY(-50%) scale(.9)}
.auth-msg{font-size:12.5px;color:var(--gold-soft);background:rgba(232,180,92,.1);border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:14px;line-height:1.4}
.gate-card{background:linear-gradient(170deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:12px;text-align:left}
.gate-t{font-family:var(--serif);font-weight:600;font-size:15px;margin-bottom:12px;color:var(--gold-soft)}
.gate-or{color:var(--ink-faint);font-size:12px;letter-spacing:.1em;margin:6px 0 12px}
.btn-outline{width:100%;padding:14px;border-radius:13px;background:transparent;border:1px solid var(--line-strong);color:var(--gold-soft);font-family:var(--serif);font-weight:600;font-size:14px}
.btn-outline:active{transform:scale(.98)}
.menu-item{width:100%;text-align:left;padding:15px 14px;border-radius:12px;background:var(--panel);border:1px solid var(--line);color:var(--ink);font-size:14.5px;font-weight:500;margin-bottom:9px}
.menu-item:active{transform:scale(.98)}
.back-link{background:none;color:var(--ink-dim);font-size:13px;padding:0;margin-bottom:8px}

/* família / membros */
.invite-card{background:radial-gradient(160px 110px at 50% 0,rgba(232,180,92,.16),transparent 70%),linear-gradient(170deg,var(--panel-3),var(--panel));border:1px solid var(--line-strong);border-radius:18px;padding:18px;text-align:center;margin-top:8px}
.invite-card .inv-l{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint)}
.invite-card .inv-code{font-family:var(--serif);font-weight:700;font-size:30px;color:var(--gold-soft);letter-spacing:.22em;margin:6px 0 8px}
.invite-card .inv-s{font-size:11.5px;color:var(--ink-dim);line-height:1.45}
.inv-btn{margin-top:12px;padding:9px 16px;border-radius:10px;background:var(--panel-3);border:1px solid var(--line-strong);color:var(--gold-soft);font-weight:600;font-size:12.5px}
.inv-btn:active{transform:scale(.97)}
.member-row{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px}
.mem-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.mem-name{font-weight:600;font-size:15px}
.mem-role{font-size:11px;color:var(--gold);font-family:var(--serif);letter-spacing:.04em}
.perm{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 0;font-size:13px;color:var(--ink-dim)}
.sw{width:46px;height:27px;border-radius:20px;background:var(--bg);border:1px solid var(--line-strong);position:relative;flex:none;transition:.2s}
.sw .dot{position:absolute;top:2px;left:2px;width:21px;height:21px;border-radius:50%;background:var(--ink-faint);transition:.2s}
.sw.on{background:linear-gradient(180deg,var(--gold),var(--gold-deep));border-color:var(--gold)}
.sw.on .dot{left:21px;background:#1c1308}
.sw:disabled{opacity:.55}
.fam-hint{font-size:11.5px;color:var(--ink-faint);line-height:1.5;margin-top:16px;padding:0 2px}

/* ranking do placar */
.rank-row{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:14px;margin-top:10px;background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line)}
.rank-row.lead{border-color:var(--hero-color,var(--gold));box-shadow:0 0 20px -10px var(--hero-color,var(--gold))}
.rk-pos{width:26px;flex:none;text-align:center;font-size:19px}
.rk-pos .rk-n{font-family:var(--serif);font-weight:700;color:var(--ink-faint);font-size:15px}
.rk-info{flex:1;min-width:0}
.rk-name{font-weight:600;font-size:14.5px;line-height:1.2}
.rk-sub{font-size:11.5px;color:var(--ink-dim);margin-top:2px}
.rk-rewards{margin-top:4px;font-size:14px;letter-spacing:2px}
.rk-xp{flex:none;font-family:var(--serif);font-weight:700;font-size:18px;color:var(--gold-soft);text-align:right}
.rk-xp small{display:block;font-size:9px;color:var(--ink-faint);font-weight:400;letter-spacing:.1em}

/* recompensas */
.reward-intro{font-size:12px;color:var(--ink-dim);line-height:1.45;margin-bottom:10px}
.reward-empty{font-size:12.5px;color:var(--ink-faint);text-align:center;padding:18px;border:1px dashed var(--line);border-radius:13px}
.shop-item{position:relative}
.rw-del{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;background:rgba(217,106,106,.18);border:1px solid rgba(217,106,106,.4);color:var(--danger);font-size:12px;display:grid;place-items:center;line-height:1}
.rw-del:active{transform:scale(.88)}
</style>
</head>

function avatarHTML(h, w){
  const eq=h.equipped||{};
  const skin=eq._skin||SKINS[0];
  const hair=eq._hair||HAIRS[0];
  const aura=eq.aura?itemById(eq.aura):null;
  const parts=[];
  if(aura)parts.push(pieceAura(aura.color));
  if(eq.cape)parts.push(pieceCape(eq.cape));
  parts.push(pieceLegs(eq.legs,skin));
  parts.push(pieceFeet(eq.feet));
  parts.push(pieceArms(skin));
  parts.push(pieceHands(skin));
  parts.push(pieceChest(eq.chest,h.color));
  parts.push(pieceHead(skin));
  if(!coversHair(eq.head))parts.push(pieceHair(hair,eq._hairstyle));
  if(eq.head)parts.push(pieceHeadItem(eq.head));
  if(eq.offhand)parts.push(pieceOffhand(eq.offhand));
  if(eq.weapon)parts.push(pieceWeapon(eq.weapon));
  const H=Math.round(w*1.4);
  return `<div class="ava" style="width:${w}px;height:${H}px"><svg viewBox="0 0 100 140" width="100%" height="100%" style="overflow:visible;display:block">${parts.join("")}</svg></div>`;
}

/* ---------- datas / períodos ---------- */
function todayKey(d=new Date()){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function monthKey(d=new Date()){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}
function isoWeekKey(d=new Date()){
  const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=t.getUTCDay()||7; t.setUTCDate(t.getUTCDate()+4-day);
  const ys=new Date(Date.UTC(t.getUTCFullYear(),0,1));
  const wk=Math.ceil((((t-ys)/86400000)+1)/7);
  return t.getUTCFullYear()+"-W"+String(wk).padStart(2,"0");
}
function periodKey(cat,d=new Date()){
  if(cat==="diaria")return todayKey(d);
  if(cat==="semanal")return isoWeekKey(d);
  if(cat==="mensal")return monthKey(d);
  return "once";
}

/* ---------- níveis ---------- */
function cumXp(L){return 50*(L-1)*L;}          // xp total para atingir o nível L
function levelInfo(totalXp){
  let lvl=1; while(totalXp>=cumXp(lvl+1))lvl++;
  const base=cumXp(lvl), need=cumXp(lvl+1)-base, into=totalXp-base;
  return {level:lvl, into, need, pct:need?Math.min(100,into/need*100):0};
}

    async signIn(email,pass){const{error}=await sb.auth.signInWithPassword({email,password:pass});if(error)throw error;},
    async signOut(){await sb.auth.signOut();this.session=null;this.me=null;this.guild=null;this.guildId=null;},

      if(!session)return "auth";

      // o capitão é criado automaticamente por gatilho no banco; aqui só carregamos o vínculo
      let m=null;
      for(let i=0;i<6 && !m;i++){
        const{data:rows}=await sb.from("members").select("*").eq("guild_id",g.id).eq("user_id",uid).limit(1);

        m=ins.data;
      }
      this.guild=g; this.guildId=g.id; this.me=m;
    },
    async joinGuild(code){
      const{error}=await sb.rpc("join_guild",{code:code});
      if(error)throw error;
      const{data:mems}=await sb.from("members").select("*,guilds(*)").eq("user_id",this.session.user.id).limit(1);
      if(mems&&mems.length){this.me=mems[0]; this.guild=mems[0].guilds; this.guildId=mems[0].guild_id;}
    },

    async saveMember(m){const{data,error}=await sb.from("members").update({display_name:m.display_name,can_assign:m.can_assign,can_manage:m.can_manage}).eq("id",m.id).select().single();if(error)throw error;return data;},

  };

function heroStats(heroId){
  const mine=S.completions.filter(c=>c.hero_id===heroId);
  const xp=mine.reduce((s,c)=>s+c.xp_earned,0);
  const info=levelInfo(xp);
  const monthXp=mine.filter(c=>c.completed_at>=monthKey()+"-01").reduce((s,c)=>s+c.xp_earned,0);
  // streak de dias consecutivos com ao menos 1 conclusão
  const days=new Set(mine.map(c=>todayKey(new Date(c.completed_at))));
  let streak=0, cur=new Date();
  if(!days.has(todayKey(cur)))cur.setDate(cur.getDate()-1); // permite contar a partir de ontem
  while(days.has(todayKey(cur))){streak++;cur.setDate(cur.getDate()-1);}
  const hero=heroById(heroId)||{};
  const inv=hero.inventory||[];
  const goldSpent=inv.reduce((s,id)=>{const it=itemById(id);return s+(it?it.price:0);},0);
  const goldBal=Math.max(0, xp-goldSpent);
  return {xp, monthXp, done:mine.length, streak, gold:xp, goldSpent, goldBal, inv, ...info};
}

function questDone(quest){ // retorna a completion do período atual, ou null
  const pk=periodKey(quest.category);
  return S.completions.find(c=>c.quest_id===quest.id && c.period_key===pk) || null;
}
function questsFor(cat){
  return S.quests.filter(q=>q.active!==false && q.category===cat)
    .filter(q=>!q.assigned_to || q.assigned_to===S.activeHeroId)
    .sort((a,b)=>{const da=!!questDone(a),db_=!!questDone(b);return da-db_;});
}

/* =========================================================================
   AÇÕES
   ========================================================================= */
let busy=false;
async function completeQuest(quest, btnEl){
  if(busy)return; const hero=activeHero(); if(!hero)return;
  const existing=questDone(quest);
  const xp=DIFFS[quest.difficulty].xp;
  busy=true;
  try{
    if(existing){ // desfazer
      await store.removeCompletion(existing.id);
    }else{
      const before=heroStats(hero.id).level;
      await store.addCompletion({quest_id:quest.id, hero_id:hero.id, xp_earned:xp, period_key:periodKey(quest.category)});
      if(btnEl)sparkle(btnEl);
      toast(`<span>${quest.icon}</span> ${quest.title} <span class="t-xp">+${xp} XP</span>`);
      await refresh(false);
      const after=heroStats(hero.id).level;
      if(after>before)celebrateLevel(after);
      busy=false; render(); return;
    }
    await refresh(false); busy=false; render();
  }catch(e){busy=false; alert("Erro ao registrar a missão: "+(e.message||e));}
}

async function refresh(showSpin=true){
  if(store && store.mode==="supabase" && !store.guildId) return; // ainda sem família definida
  try{
    if(store.reloadGuild)await store.reloadGuild();
    const [h,q,c,mem]=await Promise.all([store.heroes(),store.quests(),store.completions(),store.members?store.members():Promise.resolve([])]);
    S.heroes=h; S.quests=q; S.completions=c; S.members=mem;
  }catch(e){ console.error("refresh:",e); }
  if(S.activeHeroId && !heroById(S.activeHeroId))S.activeHeroId=null;
}

function renderFeed(el){
  const recent=S.completions.slice(0,30);
  if(!recent.length){el.innerHTML=emptyState("📜","Nada registrado ainda","Complete uma missão pra começar a história");return;}
  const groups={};
  recent.forEach(c=>{const k=todayKey(new Date(c.completed_at));(groups[k]=groups[k]||[]).push(c);});
  el.innerHTML=Object.entries(groups).map(([day,items])=>`
    <div class="feed-day">${dayLabel(day)}</div>
    ${items.map(c=>{const q=S.quests.find(x=>x.id===c.quest_id);const h=heroById(c.hero_id);const t=new Date(c.completed_at);
      return `<div class="feed-item">
        <div class="f-ic">${q?q.icon:"✓"}</div>
        <div class="f-b"><div class="f-t">${q?q.title:"Missão"}</div><div class="f-s">${h?h.name:"?"} · ${String(t.getHours()).padStart(2,"0")}:${String(t.getMinutes()).padStart(2,"0")}</div></div>
        <div class="f-xp">+${c.xp_earned}</div>
      </div>`;}).join("")}`).join("");
}
function dayLabel(key){
  const t=todayKey(), y=todayKey(new Date(Date.now()-86400000));
  if(key===t)return "Hoje"; if(key===y)return "Ontem";
  const [Y,M,D]=key.split("-");return `${D}/${M}`;
}

let rewardDraft={};

    <button class="btn-ghost" onclick="closeSheet()">Cancelar</button>
  `);
  const n=document.getElementById("rwName"); if(n)n.addEventListener("input",e=>rewardDraft.name=e.target.value);

window.openRewardForm=openRewardForm; window.renderRewardForm=renderRewardForm;
window.saveReward=async function(){
  const name=(document.getElementById("rwName").value||"").trim();
  const price=parseInt((document.getElementById("rwPrice").value||"").replace(/\D/g,""))||0;
  if(!name){document.getElementById("rwName").focus();return;}
  if(price<1){document.getElementById("rwPrice").focus();return;}
  const items=[...customItems(),{id:"cust_"+Math.random().toString(36).slice(2,9),name:name,emoji:rewardDraft.emoji,price:price,slot:"reward"}];
  try{ await store.setCustomItems(items); closeSheet(); await refresh(false); render(); }
  catch(e){ alert("Erro ao salvar recompensa: "+(e.message||e)); }
};
window.removeReward=async function(id){
  if(!confirm("Remover esta recompensa da loja?"))return;
  const items=customItems().filter(x=>x.id!==id);
  try{ await store.setCustomItems(items); await refresh(false); render(); }
  catch(e){ alert("Erro: "+(e.message||e)); }
};
window.buyItem=async function(id){
  if(busy)return; const h=activeHero(); const it=itemById(id); if(!h||!it)return;
  const st=heroStats(h.id); const inv=h.inventory||[];
  if(inv.includes(id))return;
  if(st.goldBal<it.price){toast(`🪙 Gold insuficiente — faltam ${fmt(it.price-st.goldBal)}`);return;}
  busy=true;
  const newInv=[...inv,id];
  const newEq={...(h.equipped||{})};
  if(it.slot!=="reward")newEq[it.slot]=id; // recompensa não veste o avatar
  try{
    await store.saveHero({...h,inventory:newInv,equipped:newEq});
    if(it.slot==="reward")toast(`🎁 <b>${it.name}</b> resgatado! Avise os pais 😄 <span class="t-xp">-${fmt(it.price)} 🪙</span>`);
    else toast(`🛒 <b>${it.name}</b> comprado! <span class="t-xp">-${fmt(it.price)} 🪙</span>`);
    await refresh(false); busy=false; render();
  }catch(e){busy=false; alert("Erro na compra: "+(e.message||e));}
};
window.undoReward=async function(heroId,itemId){
  const h=S.heroes.find(x=>x.id===heroId); if(!h)return;
  if(!confirm("Desfazer este resgate? O Gold volta para o herói."))return;
  const inv=(h.inventory||[]).filter(x=>x!==itemId);
  try{ await store.saveHero({...h,inventory:inv}); await refresh(false); render(); }
  catch(e){ alert("Erro: "+(e.message||e)); }
};
window.equipItem=async function(id){
  if(busy)return; const h=activeHero(); const it=itemById(id); if(!h||!it)return;
  busy=true;
  const eq={...(h.equipped||{})};
  if(eq[it.slot]===id)delete eq[it.slot]; else eq[it.slot]=id; // toca pra equipar, toca de novo pra tirar
  try{
    await store.saveHero({...h,equipped:eq});
    await refresh(false); busy=false; render();
  }catch(e){busy=false; alert("Erro ao equipar: "+(e.message||e));}
};

<!--
═══════════════════════════════════════════════════════════════════════════
  COMO DEIXAR ONLINE (várias famílias, com contas) — ~15 minutos
═══════════════════════════════════════════════════════════════════════════

1) CRIE O PROJETO SUPABASE (grátis)
   • supabase.com → New project → nome + senha do banco + região South America.
   • Em Project Settings → API, copie a "Project URL" e a chave "anon public".
   • Cole nas duas linhas lá no topo do arquivo (SUPABASE_URL e SUPABASE_ANON).

2) DESLIGUE A CONFIRMAÇÃO DE E-MAIL (pra cadastro entrar na hora)
   • Authentication → Providers → Email → DESMARQUE "Confirm email" → Save.
   • (Assim pai/mãe conseguem criar a conta da criança sem precisar de caixa de e-mail.)

3) CRIE AS TABELAS E AS REGRAS DE ISOLAMENTO
   • SQL Editor → New query → cole TODO o bloco abaixo → Run:

   -- ===== TABELAS =====
   create table guilds (
     id uuid primary key default gen_random_uuid(),
     name text not null,
     invite_code text unique not null,
     captain_id uuid not null,
     created_at timestamptz default now()
   );
   create table members (
     id uuid primary key default gen_random_uuid(),
     guild_id uuid not null references guilds(id) on delete cascade,
     user_id uuid not null,
     display_name text default 'Membro',
     role text default 'member',          -- 'captain' | 'member'
     can_assign boolean default false,     -- pode criar/designar tarefas
     can_manage boolean default false,     -- pode gerenciar a família
     created_at timestamptz default now(),
     unique (guild_id, user_id)
   );
   create table heroes (
     id uuid primary key default gen_random_uuid(),
     guild_id uuid not null references guilds(id) on delete cascade,
     member_id uuid references members(id) on delete set null,  -- null = herói sem conta (ex: criança)
     name text not null,
     hero_class text default 'Aventureiro',
     color text default '#E8B45C',
     inventory jsonb default '[]'::jsonb,
     equipped jsonb default '{}'::jsonb,
     created_at timestamptz default now()
   );
   create table quests (
     id uuid primary key default gen_random_uuid(),
     guild_id uuid not null references guilds(id) on delete cascade,
     title text not null, icon text default '⚔️',
     difficulty text default 'normal', category text default 'diaria',
     assigned_to uuid references heroes(id) on delete set null,
     active boolean default true,
     created_at timestamptz default now()
   );
   create table completions (
     id uuid primary key default gen_random_uuid(),
     guild_id uuid not null references guilds(id) on delete cascade,
     quest_id uuid references quests(id) on delete cascade,
     hero_id uuid references heroes(id) on delete cascade,
     xp_earned int not null, period_key text not null,
     completed_at timestamptz default now()
   );
   create unique index uniq_completion_period on completions (quest_id, period_key);

   -- ===== FUNÇÕES DE PERMISSÃO (rodam ignorando RLS, evitam recursão) =====
   create or replace function fn_is_member(g uuid) returns boolean language sql security definer stable as $$
     select exists(select 1 from members m where m.guild_id=g and m.user_id=auth.uid());
   $$;
   create or replace function fn_can_assign(g uuid) returns boolean language sql security definer stable as $$
     select exists(select 1 from members m where m.guild_id=g and m.user_id=auth.uid() and (m.role='captain' or m.can_assign));
   $$;
   create or replace function fn_can_manage(g uuid) returns boolean language sql security definer stable as $$
     select exists(select 1 from members m where m.guild_id=g and m.user_id=auth.uid() and (m.role='captain' or m.can_manage));
   $$;

   -- entrar numa família pelo código (sem precisar enxergar a tabela guilds)
   create or replace function join_guild(code text) returns uuid language plpgsql security definer as $$
   declare gid uuid;
   begin
     select id into gid from guilds where invite_code = upper(code);
     if gid is null then raise exception 'Código inválido'; end if;
     if not exists(select 1 from members where guild_id=gid and user_id=auth.uid()) then
       insert into members(guild_id,user_id,display_name,role,can_assign,can_manage)
       values (gid, auth.uid(), split_part(coalesce(auth.jwt()->>'email','Membro'),'@',1), 'member', false, false);
     end if;
     return gid;
   end; $$;

   -- ===== LIGA O ISOLAMENTO (RLS) =====
   alter table guilds      enable row level security;
   alter table members     enable row level security;
   alter table heroes      enable row level security;
   alter table quests      enable row level security;
   alter table completions enable row level security;

   create policy g_sel on guilds for select using (fn_is_member(id));
   create policy g_ins on guilds for insert with check (captain_id = auth.uid());
   create policy g_upd on guilds for update using (fn_can_manage(id));

   create policy m_sel on members for select using (fn_is_member(guild_id));
   create policy m_ins on members for insert with check (user_id = auth.uid() or fn_can_manage(guild_id));
   create policy m_upd on members for update using (fn_can_manage(guild_id));
   create policy m_del on members for delete using (fn_can_manage(guild_id) and role <> 'captain');

   create policy h_sel on heroes for select using (fn_is_member(guild_id));
   create policy h_ins on heroes for insert with check (fn_is_member(guild_id));
   create policy h_upd on heroes for update using (fn_is_member(guild_id));
   create policy h_del on heroes for delete using (fn_can_manage(guild_id));

   create policy q_sel on quests for select using (fn_is_member(guild_id));
   create policy q_cud on quests for all using (fn_can_assign(guild_id)) with check (fn_can_assign(guild_id));

   create policy c_sel on completions for select using (fn_is_member(guild_id));
   create policy c_ins on completions for insert with check (fn_is_member(guild_id));
   create policy c_del on completions for delete using (fn_is_member(guild_id));

   • Se aparecer "Success", o banco está pronto e cada família só enxerga os próprios dados.
